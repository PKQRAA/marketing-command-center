<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 350px; min-height: 400px; font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 15px; }
.header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
.header h1 { font-size: 16px; margin-bottom: 5px; }
.url { font-size: 10px; opacity: 0.8; }
.btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.btn-blue { background: #6366f1; color: white; }
.btn-blue:hover { background: #4f46e5; }
.btn-green { background: #22c55e; color: white; }
.btn-green:hover { background: #16a34a; }
.btn-red { background: #ef4444; color: white; }
.btn-red:hover { background: #dc2626; }
.btn-orange { background: #f59e0b; color: white; }
.btn-orange:hover { background: #d97706; }
.btn-gray { background: #475569; color: white; }
.btn-gray:hover { background: #334155; }
.section { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
.section h3 { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
.result { background: #1e293b; padding: 8px 12px; border-radius: 6px; margin: 5px 0; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
.result-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-btn { background: #6366f1; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
.copy-btn:hover { background: #4f46e5; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.stat { background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; }
.stat-val { font-size: 18px; font-weight: bold; color: #6366f1; }
.stat-label { font-size: 8px; color: #64748b; text-transform: uppercase; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 10px 20px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.error { background: #7f1d1d; padding: 10px; border-radius: 8px; color: #fca5a5; font-size: 11px; text-align: center; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Marketing Command Center</h1>
  <div class="url" id="currentUrl">Loading...</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="statCtas">0</div><div class="stat-label">CTAs</div></div>
  <div class="stat"><div class="stat-val" id="statEmails">0</div><div class="stat-label">Emails</div></div>
  <div class="stat"><div class="stat-val" id="statPrices">0</div><div class="stat-label">Prices</div></div>
  <div class="stat"><div class="stat-val" id="statSeo">0</div><div class="stat-label">SEO</div></div>
</div>

<div id="errorMsg" class="error" style="display:none"></div>

<div class="section">
  <h3>Quick Actions</h3>
  <button class="btn btn-blue" id="btnScan">🔍 Full Scan</button>
  <div class="grid-2">
    <button class="btn btn-gray" id="btnScanCTA">CTAs</button>
    <button class="btn btn-gray" id="btnScanEmail">Emails</button>
    <button class="btn btn-gray" id="btnScanPrice">Prices</button>
    <button class="btn btn-gray" id="btnAnalyzeSEO">SEO</button>
  </div>
</div>

<div class="section">
  <h3>Results</h3>
  <div id="resultsList">
    <div class="result"><span class="result-text">Click "Full Scan" to start</span></div>
  </div>
</div>

<div class="section">
  <h3>Export & Tools</h3>
  <button class="btn btn-green" id="btnExport">📥 Export Report</button>
  <button class="btn btn-orange" id="btnPDF">📄 PDF Report</button>
  <button class="btn btn-red" id="btnClear">🗑️ Clear All</button>
</div>

<div class="toast" id="toast">Done!</div>

<script src="popup.js"></script>
</body>
</html>
